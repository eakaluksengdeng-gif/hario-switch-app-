name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter project
        run: flutter create --org com.hario --project-name teki tmp_app

      - name: Replace main.dart with our code
        run: cp lib/main.dart tmp_app/lib/main.dart

      - name: Replace pubspec.yaml
        run: cp pubspec.yaml tmp_app/pubspec.yaml

      - name: Copy app icon
        run: |
          mkdir -p tmp_app/assets/icon
          cp app_icon.png tmp_app/assets/icon/app_icon.png

      - name: Set app name to Teki
        run: |
          sed -i 's/android:label="teki"/android:label="Teki"/g' tmp_app/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd tmp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: teki-apk
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
